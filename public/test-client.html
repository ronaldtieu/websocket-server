<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Test Client</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a1a;
      color: #eee;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .section {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .section h2 {
      font-size: 1rem;
      margin-top: 0;
      margin-bottom: 10px;
      color: #4fc3f7;
    }
    label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      font-size: 1rem;
    }
    input { background: #1a1a1a; color: #fff; }
    button {
      cursor: pointer;
      font-weight: 600;
    }
    .btn-connect { background: #4caf50; border: none; }
    .btn-connect:hover { background: #43a047; }
    .btn-disconnect { background: #f44336; border: none; }
    .btn-action { background: #2196f3; border: none; }
    .btn-action:hover { background: #1e88e5; }
    .status {
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .status.connected { background: #4caf50; }
    .status.disconnected { background: #f44336; }
    #gameState {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    #events {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .event { margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px solid #333; }
    .event .time { color: #888; }
    .event .type { color: #4fc3f7; }
    .event .data { color: #81c784; }
  </style>
</head>
<body>
  <h1>WebSocket Test Client</h1>

  <!-- Connection Section -->
  <div class="section">
    <h2>Connection</h2>
    <div id="status" class="status disconnected">Disconnected</div>
    <label>Server URL:</label>
    <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://192.168.x.x:3000">
    <button id="connectBtn" class="btn-connect">Connect</button>
  </div>

  <!-- Join Game Section -->
  <div class="section" id="joinSection" style="display: none;">
    <h2>Join Game</h2>
    <label>Game ID:</label>
    <input type="text" id="gameId" value="room1" placeholder="Enter game room ID">
    <label>Your Name:</label>
    <input type="text" id="playerName" value="Player1" placeholder="Enter your name">
    <button id="joinBtn" class="btn-action">Join Game</button>
  </div>

  <!-- Game Actions Section -->
  <div class="section" id="actionSection" style="display: none;">
    <h2>Game Actions</h2>
    <label>Action Type:</label>
    <input type="text" id="actionType" value="draw_card" placeholder="e.g., draw_card">
    <label>Action Data (JSON):</label>
    <input type="text" id="actionPayload" value='{"cardId": 1}' placeholder='{"key": "value"}'>
    <button id="sendActionBtn" class="btn-action">Send Action</button>
    <button id="startGameBtn" class="btn-action">Start Game</button>
    <button id="leaveBtn" class="btn-disconnect">Leave Game</button>
  </div>

  <!-- Game State Section -->
  <div class="section">
    <h2>Game State</h2>
    <div id="gameState">Not in a game</div>
  </div>

  <!-- Events Log -->
  <div class="section">
    <h2>Event Log</h2>
    <div id="events"></div>
  </div>

  <script>
    let socket = null;

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const joinSection = document.getElementById('joinSection');
    const actionSection = document.getElementById('actionSection');
    const joinBtn = document.getElementById('joinBtn');
    const sendActionBtn = document.getElementById('sendActionBtn');
    const startGameBtn = document.getElementById('startGameBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const gameStateEl = document.getElementById('gameState');
    const eventsEl = document.getElementById('events');

    // Connect to server
    connectBtn.addEventListener('click', () => {
      const serverUrl = document.getElementById('serverUrl').value;
      connect(serverUrl);
    });

    function connect(serverUrl) {
      socket = io(serverUrl, {
        transports: ['websocket', 'polling']
      });

      socket.on('connect', () => {
        updateStatus(true);
        joinSection.style.display = 'block';
        logEvent('connect', 'Connected to server');
      });

      socket.on('disconnect', () => {
        updateStatus(false);
        joinSection.style.display = 'none';
        actionSection.style.display = 'none';
        logEvent('disconnect', 'Disconnected from server');
      });

      socket.on('game_state', (state) => {
        gameStateEl.textContent = JSON.stringify(state, null, 2);
        logEvent('game_state', 'State updated');
      });

      socket.on('error', (data) => {
        logEvent('error', data.message || 'Unknown error');
      });

      socket.on('player_joined', (data) => {
        logEvent('player_joined', `${data.playerName} joined`);
      });

      socket.on('player_left', (data) => {
        logEvent('player_left', `${data.playerName} left`);
      });

      socket.on('game_started', (data) => {
        logEvent('game_started', 'Game has started!');
      });
    }

    // Join game
    joinBtn.addEventListener('click', () => {
      const gameId = document.getElementById('gameId').value;
      const playerName = document.getElementById('playerName').value;

      if (!gameId || !playerName) {
        alert('Please enter both Game ID and Player Name');
        return;
      }

      socket.emit('join_game', { gameId, playerName });
      actionSection.style.display = 'block';
      logEvent('join_game', `Joining ${gameId} as ${playerName}`);
    });

    // Send action
    sendActionBtn.addEventListener('click', () => {
      const type = document.getElementById('actionType').value;
      const payloadStr = document.getElementById('actionPayload').value;

      try {
        const payload = JSON.parse(payloadStr);
        socket.emit('game_action', { type, payload });
        logEvent('game_action', `Sent: ${type}`);
      } catch (e) {
        alert('Invalid JSON in Action Data');
      }
    });

    // Start game
    startGameBtn.addEventListener('click', () => {
      socket.emit('start_game');
      logEvent('start_game', 'Requesting game start');
    });

    // Leave game
    leaveBtn.addEventListener('click', () => {
      socket.emit('leave_game');
      actionSection.style.display = 'none';
      logEvent('leave_game', 'Left the game');
    });

    function updateStatus(connected) {
      if (connected) {
        statusEl.textContent = 'Connected';
        statusEl.className = 'status connected';
        connectBtn.textContent = 'Connected';
        connectBtn.disabled = true;
      } else {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'status disconnected';
        connectBtn.textContent = 'Connect';
        connectBtn.disabled = false;
      }
    }

    function logEvent(type, data) {
      const time = new Date().toLocaleTimeString();
      const eventEl = document.createElement('div');
      eventEl.className = 'event';
      eventEl.innerHTML = `<span class="time">[${time}]</span> <span class="type">${type}</span>: <span class="data">${JSON.stringify(data)}</span>`;
      eventsEl.insertBefore(eventEl, eventsEl.firstChild);

      // Keep only last 50 events
      while (eventsEl.children.length > 50) {
        eventsEl.removeChild(eventsEl.lastChild);
      }
    }
  </script>
</body>
</html>
